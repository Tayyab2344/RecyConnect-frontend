name: recyconnect
description: A sustainable waste management and recycling platform
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # Image & Camera
  image_picker: ^1.1.2
  
  # OCR
  google_mlkit_text_recognition: ^0.10.0
  
  # UI & Icons
  cupertino_icons: ^1.0.6

  # File handling
  path_provider: ^2.1.1

  # Internationalization & Date Formatting
  intl: ^0.19.0
  google_fonts: ^6.3.2
  

  

  
  # Charts & Data Visualization
  fl_chart: ^0.66.0
  
  # Location & Permissions
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.1.0
  
  # Data Export
  csv: ^6.0.0
  
  # Utilities
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
