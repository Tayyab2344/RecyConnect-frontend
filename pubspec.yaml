name: recyconnect
description: A sustainable waste management and recycling platform
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2

  # Stripe Payment
  flutter_stripe: ^10.1.1

  # Local Storage
  shared_preferences: ^2.3.2
  
  # Image & Camera
  image_picker: ^1.1.2

  # TFLite for on-device AI classification
  tflite_flutter: ^0.11.0
  
  # OCR
  google_mlkit_commons: ^0.11.0
  google_mlkit_text_recognition: ^0.15.0
  
  # UI & Icons
  cupertino_icons: ^1.0.6

  # Charts & Graphs
  fl_chart: ^0.69.0

  # Fonts


  # SVG Icons
  flutter_svg: ^2.0.10

  # File handling
  path_provider: ^2.1.1

  # Internationalization & Date Formatting
  intl: ^0.19.0
  google_fonts: ^6.3.2
  

  

  
  # Charts & Data Visualization

  
  # Location & Permissions
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.1.0
  
  # Data Export
  csv: ^6.0.0
  
  # Utilities
  url_launcher: ^6.2.4

  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.13.1

  # Animations & Modern UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.1.1
  glassmorphism: ^3.0.0
  blur: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/recyconnect_outputs/labels.txt
    - assets/recyconnect_outputs/recyconnect_model_quantized.tflite
